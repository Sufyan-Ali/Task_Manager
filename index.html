<!doctype html>
<html>
  <head>
    <title>Js Learning</title>
  </head>
  <body>
    <h1>This is a task manager app (Todo list).</h1>
    <div>
      <input id="addTaskInput" type="text" placeholder="Add Task" />
      <button id="addTaskButton">Add Task</button>
    </div>
    <div id="categoryInput">
        <input type="checkbox" name="categoryCheckbox" value="study" id="">Study
        <input type="checkbox" name="categoryCheckbox" value="work" id="">Work
        <input type="checkbox" name="categoryCheckbox" value="personal" id="">Personal
    </div>
    <br>
    <div>
      <input id="searchTaskInput" type="text" placeholder="Search Task" />
    </div>
    <br>
    <div >
    <button id= "importTasksButton">Import Tasks</button>
    <p id="importPTag"></p>
    </div>
    <h2>Tasks Status</h2>
    <div>
      <p id="totalTaskCount" >Total Tasks: 0</p>
      <p id="completedTaskCount">Completed Tasks: 0</p>
      <p id="pendingTaskCount">Pending Tasks: 0</p>
    </div>
    <h2>Current Tasks</h2>
    <div>
        Status filter: 
        <button id="displayAllTasks">All</button>
        <button id="displayCompletedTasks">Completed</button>
        <button id="displayPendingTasks">Pending</button>
    </div>
    <br>
    <div>
        Category filter: 
        <button id="displayAllCategory">All</button>
        <button id="displayStudyCategory">Study</button>
        <button id="displayWorkCategory">Work</button>
        <button id="displayPersonalCategory">Personal</button>
    </div>
    <ul id="list">
      <li>No tasks</li>
    </ul>
    <script src="script.js"></script>
  </body>
</html>
